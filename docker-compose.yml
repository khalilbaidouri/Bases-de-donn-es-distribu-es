version: '3.8'

networks:
  eshop-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

services:

  oracle-global:
    image: container-registry.oracle.com/database/express:21.3.0-xe
    container_name: eshop-global
    hostname: oracle-global
    environment:
      ORACLE_PWD: Oracle123
      ORACLE_CHARACTERSET: AL32UTF8
    ports:
      - "1524:1521"
    networks:
      eshop-network:
        ipv4_address: 172.20.0.10
    volumes:
      - oracle-global-data:/opt/oracle/oradata
      - ./init/global:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "sqlplus", "-L", "sys/Oracle123@localhost/XE as sysdba", "@/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s

  oracle-site1:
    image: container-registry.oracle.com/database/express:21.3.0-xe
    container_name: eshop-site1
    hostname: oracle-site1
    environment:
      ORACLE_PWD: Oracle123
      ORACLE_CHARACTERSET: AL32UTF8
    ports:
      - "1522:1521"
    networks:
      eshop-network:
        ipv4_address: 172.20.0.11
    volumes:
      - oracle-site1-data:/opt/oracle/oradata
      - ./init/site1:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "sqlplus", "-L", "sys/Oracle123@localhost/XE as sysdba", "@/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s

  oracle-site2:
    image: container-registry.oracle.com/database/express:21.3.0-xe
    container_name: eshop-site2
    hostname: oracle-site2
    environment:
      ORACLE_PWD: Oracle123
      ORACLE_CHARACTERSET: AL32UTF8
    ports:
      - "1523:1521"
    networks:
      eshop-network:
        ipv4_address: 172.20.0.12
    volumes:
      - oracle-site2-data:/opt/oracle/oradata
      - ./init/site2:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "sqlplus", "-L", "sys/Oracle123@localhost/XE as sysdba", "@/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s

volumes:
  oracle-global-data:
  oracle-site1-data:
  oracle-site2-data: